---
- name: Test mongodb_shard module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create shard (check mode)
      stevefulme1.mongodb.mongodb_shard:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
        name: "test-shard"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: Create shard
      stevefulme1.mongodb.mongodb_shard:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
        name: "test-shard"
        state: present
      register: create_result
      ignore_errors: true

    - name: Verify create result
      ansible.builtin.assert:
        that:
          - create_result is changed or create_result is failed
        fail_msg: "Create did not report expected result"

    - name: Create shard again (idempotency)
      stevefulme1.mongodb.mongodb_shard:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
        name: "test-shard"
        state: present
      register: idem_result
      ignore_errors: true

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - idem_result is not changed or idem_result is failed
        fail_msg: "Idempotency check failed"

    - name: List shards
      stevefulme1.mongodb.mongodb_shard_info:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.shards is defined or list_result is failed
        fail_msg: "List did not return expected structure"

    - name: Delete shard
      stevefulme1.mongodb.mongodb_shard:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
        name: "test-shard"
        state: absent
      register: delete_result
      ignore_errors: true

    - name: Verify delete result
      ansible.builtin.assert:
        that:
          - delete_result is changed or delete_result is failed
        fail_msg: "Delete did not report expected result"

    - name: Delete shard again (idempotency)
      stevefulme1.mongodb.mongodb_shard:
        api_public_key: "{{ atlas_public_key }}"
        api_private_key: "{{ atlas_private_key }}"
        group_id: "{{ atlas_group_id }}"
        name: "test-shard"
        state: absent
      register: del_idem_result
      ignore_errors: true

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - del_idem_result is not changed or del_idem_result is failed
        fail_msg: "Delete idempotency check failed"

---
- name: Test mongodb_atlas_alert module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create atlas_alert (check mode)
      stevefulme1.mongodb.mongodb_atlas_alert:
        host: "{{ test_host }}"
        name: "test-atlas-alert"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: List atlas_alerts
      stevefulme1.mongodb.mongodb_atlas_alert_info:
        host: "{{ test_host }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.atlas_alerts is defined or list_result is failed
        fail_msg: "List did not return expected structure"

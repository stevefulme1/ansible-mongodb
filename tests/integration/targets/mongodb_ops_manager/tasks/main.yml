---
# Integration tests for stevefulme1.mongodb.mongodb_ops_manager
# Full CRUD lifecycle: CREATE -> idempotency -> UPDATE -> DELETE -> idempotency

- name: Test mongodb_ops_manager CRUD lifecycle
  block:
    - name: Create ops_manager (check mode)
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: present
      check_mode: true
      register: check_result

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed

    - name: Create ops_manager
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: present
      register: create_result

    - name: Verify create result
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.ops_manager is defined

    - name: Create ops_manager again (idempotency)
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: present
      register: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Fetch ops_manager info
      stevefulme1.mongodb.mongodb_ops_manager_info:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
      register: info_result

    - name: Verify info returns data
      ansible.builtin.assert:
        that:
          - info_result.ops_managers is defined

    - name: Delete ops_manager
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: absent
      register: delete_result

    - name: Verify delete result
      ansible.builtin.assert:
        that:
          - delete_result is changed

    - name: Delete ops_manager again (idempotency)
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: absent
      register: delete_idem_result

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - delete_idem_result is not changed

  always:
    - name: Cleanup - ensure test resource is removed
      stevefulme1.mongodb.mongodb_ops_manager:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ops_manager"
        state: absent
      failed_when: false

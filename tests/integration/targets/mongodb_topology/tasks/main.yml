---
# Integration tests for stevefulme1.mongodb.mongodb_topology
# Full CRUD lifecycle: CREATE -> idempotency -> UPDATE -> DELETE -> idempotency

- name: Test mongodb_topology CRUD lifecycle
  block:
    - name: Create topology (check mode)
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: present
      check_mode: true
      register: check_result

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed

    - name: Create topology
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: present
      register: create_result

    - name: Verify create result
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.topology is defined

    - name: Create topology again (idempotency)
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: present
      register: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Fetch topology info
      stevefulme1.mongodb.mongodb_topology_info:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
      register: info_result

    - name: Verify info returns data
      ansible.builtin.assert:
        that:
          - info_result.topologys is defined

    - name: Delete topology
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: absent
      register: delete_result

    - name: Verify delete result
      ansible.builtin.assert:
        that:
          - delete_result is changed

    - name: Delete topology again (idempotency)
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: absent
      register: delete_idem_result

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - delete_idem_result is not changed

  always:
    - name: Cleanup - ensure test resource is removed
      stevefulme1.mongodb.mongodb_topology:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-topology"
        state: absent
      failed_when: false

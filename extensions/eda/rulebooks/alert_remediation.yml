---
- name: "Mongodb Alert Remediation"
  hosts: all
  sources:
    - stevefulme1.mongodb.change_stream:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Critical alert
      condition: >-
        event.mongodb.severity is defined and
        event.mongodb.severity == "critical"
      action:
        run_playbook:
          name: remediate.yml
          extra_vars:
            alert_host: "{{ event.mongodb.host | default('') }}"
            alert_id: "{{ event.mongodb.id | default('') }}"
    - name: Warning alert
      condition: >-
        event.mongodb.severity is defined and
        event.mongodb.severity == "warning"
      action:
        print_event:
          pretty: true

---
# extensions/audit/event_query.yml
# Maps module return values to the AAP Normalized Resource Taxonomy
# for indirect node counting.
#
# MongoDB modules return API response dicts via the ApiClient.  The dict
# keys vary per resource type (atlas_cluster, replicaset, etc.).

stevefulme1.mongodb.mongodb_atlas_cluster:
  query: >-
    {
      name: .atlas_cluster.name,
      canonical_facts: {
        uuid: .atlas_cluster.id
      },
      facts: {
        device_type: "database_nosql"
      }
    }


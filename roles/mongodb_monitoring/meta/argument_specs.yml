---
argument_specs:
  main:
    short_description: "Configure MongoDB monitoring and alerting"
    options:
      mongodb_monitoring_host:
        description: Target host address
        type: str
        required: true
      mongodb_monitoring_username:
        description: Authentication username
        type: str
      mongodb_monitoring_password:
        description: Authentication password
        type: str
        no_log: true
      mongodb_monitoring_api_key:
        description: API key for authentication
        type: str
        no_log: true
      mongodb_monitoring_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      mongodb_monitoring_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

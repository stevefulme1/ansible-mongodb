---
argument_specs:
  main:
    short_description: "Restore MongoDB from backup snapshots"
    options:
      mongodb_restore_host:
        description: Target host address
        type: str
        required: true
      mongodb_restore_username:
        description: Authentication username
        type: str
      mongodb_restore_password:
        description: Authentication password
        type: str
      mongodb_restore_api_key:
        description: API key for authentication
        type: str
      mongodb_restore_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      mongodb_restore_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

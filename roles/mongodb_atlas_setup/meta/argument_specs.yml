---
argument_specs:
  main:
    short_description: "Provision MongoDB Atlas cluster with networking"
    options:
      mongodb_atlas_setup_host:
        description: Target host address
        type: str
        required: true
      mongodb_atlas_setup_username:
        description: Authentication username
        type: str
      mongodb_atlas_setup_password:
        description: Authentication password
        type: str
        no_log: true
      mongodb_atlas_setup_api_key:
        description: API key for authentication
        type: str
        no_log: true
      mongodb_atlas_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      mongodb_atlas_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
